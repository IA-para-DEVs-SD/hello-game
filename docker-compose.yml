# Docker Compose para PyBlaze
# Facilita o desenvolvimento e testes com Docker

version: '3.8'

services:
  # Serviço principal do jogo
  pyblaze:
    build:
      context: .
      dockerfile: Dockerfile
    image: pyblaze:latest
    container_name: pyblaze-game
    environment:
      # Modo headless para CI/CD (sem display)
      SDL_VIDEODRIVER: ${SDL_VIDEODRIVER:-dummy}
      SDL_AUDIODRIVER: ${SDL_AUDIODRIVER:-dummy}
      # Variáveis de configuração
      PYBLAZE_DEBUG: ${PYBLAZE_DEBUG:-false}
      PYBLAZE_LOG_LEVEL: ${PYBLAZE_LOG_LEVEL:-INFO}
    volumes:
      # Monta código-fonte para desenvolvimento (hot reload)
      - ./src:/app/src:ro
      - ./assets:/app/assets:ro
      # Monta saves e logs
      - pyblaze-saves:/app/saves
      - pyblaze-logs:/app/logs
    restart: unless-stopped
    networks:
      - pyblaze-net

  # Serviço de desenvolvimento com hot reload
  pyblaze-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: pyblaze:dev
    container_name: pyblaze-dev
    command: uv run python -m pytest tests/ -v --cov=src/pyblaze
    environment:
      SDL_VIDEODRIVER: dummy
      SDL_AUDIODRIVER: dummy
      PYBLAZE_DEBUG: "true"
      PYBLAZE_LOG_LEVEL: DEBUG
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./assets:/app/assets:ro
    networks:
      - pyblaze-net
    profiles:
      - dev

  # Serviço para executar testes
  pyblaze-test:
    build:
      context: .
      dockerfile: Dockerfile
    image: pyblaze:test
    container_name: pyblaze-test
    command: uv run pytest tests/ -v --cov=src/pyblaze --cov-report=html --cov-report=term
    environment:
      SDL_VIDEODRIVER: dummy
      SDL_AUDIODRIVER: dummy
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
      - ./htmlcov:/app/htmlcov
    networks:
      - pyblaze-net
    profiles:
      - test

  # Serviço para linting e verificações
  pyblaze-lint:
    build:
      context: .
      dockerfile: Dockerfile
    image: pyblaze:lint
    container_name: pyblaze-lint
    command: >
      sh -c "
        uv run ruff format --check src/ tests/ &&
        uv run ruff check src/ tests/ &&
        uv run mypy src/
      "
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
    networks:
      - pyblaze-net
    profiles:
      - lint

volumes:
  # Volume persistente para saves
  pyblaze-saves:
    driver: local
  # Volume persistente para logs
  pyblaze-logs:
    driver: local

networks:
  pyblaze-net:
    driver: bridge
    name: pyblaze-network
